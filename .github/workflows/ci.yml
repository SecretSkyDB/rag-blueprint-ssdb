name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ruff
        run: pip install ruff
      - name: Lint workflow YAMLs and chain shim
        run: ruff check src/

  ssdb-end-to-end:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      docker:
        image: docker:24
    steps:
      - uses: actions/checkout@v4
      - name: Bring up SSDB-overlay compose stack
        run: |
          cp deploy/compose/.env.example deploy/compose/.env
          # NGC key is mocked: the SSDB stack itself doesn't need NIMs for the
          # demo path; embed/rerank/LLM NIMs are mocked by separate fixtures.
          docker compose -f deploy/compose/docker-compose.yaml \
                         -f deploy/compose/ssdb-overlay.yaml up -d \
                         ssdb-share-1 ssdb-share-2 ssdb-share-3 ssdb-proxy ssdb-bridge

      - name: Ingest demo corpus
        run: |
          for f in data/healthcare_synthetic/*.md data/healthcare_synthetic/*.txt; do
            curl -sS -X POST -H 'content-type: application/json' \
              http://localhost:8000/api/ingest \
              -d "$(jq -Rs --arg t "$(basename $f)" '{title:$t, source:$t, text:.}' < $f)"
          done

      - name: 5 known-answer queries via nat-retriever-ssdb
        run: |
          pip install nat-retriever-ssdb pytest pytest-asyncio
          SSDB_BRIDGE_URL=http://localhost:8000 \
            pytest tests/integration -q
