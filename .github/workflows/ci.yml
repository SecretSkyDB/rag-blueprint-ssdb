name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install ruff
        run: pip install ruff
      - name: Lint workflow YAMLs and chain shim
        run: ruff check src/

  # Validates the compose stacks parse end-to-end with all env-var
  # substitutions resolved. Catches regressions like the `:?` mandatory-
  # substitution bug that wedged ssdb-overlay.yaml before c7a8a70, and
  # the wrong filename / renamed-service bugs that wedged the previous
  # `ssdb-end-to-end` job.
  #
  # Does not pull or run images -- the three SSDB images
  # (ssdbpg, ssdb-proxy, ssdb-sql-rag) live in the private mono-repo and
  # have not been published to ghcr.io/secretskydb/* yet. When they are,
  # add a follow-up job that brings the stack up and runs the smoke.
  compose-validate:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - name: Seed .env (dummy values, parser-only)
        run: |
          cp deploy/compose/.env.example deploy/compose/.env
          # The two upstream files use :? (mandatory) for NVIDIA_API_KEY.
          # The laptop overlay uses :- (default-empty) per c7a8a70 so it
          # parses fine with the placeholder; the production overlay
          # needs a non-empty value to satisfy the parser.
          {
            echo "SSDB_SHARE_PWD=ci-dummy"
            echo "NVIDIA_API_KEY=ci-dummy"
          } >> deploy/compose/.env
      - name: Validate laptop overlay (ssdb + laptop)
        run: |
          docker compose --env-file deploy/compose/.env \
            -f deploy/compose/ssdb-overlay.yaml \
            -f deploy/compose/laptop-overlay.yaml \
            config -q
      - name: Validate production overlay (rag + ingestor + ssdb)
        run: |
          docker compose --env-file deploy/compose/.env \
            -f deploy/compose/docker-compose-rag-server.yaml \
            -f deploy/compose/docker-compose-ingestor-server.yaml \
            -f deploy/compose/ssdb-overlay.yaml \
            config -q

  # Builds the two locally-buildable images on every push so we catch
  # Dockerfile regressions like the fallback-ui port mismatch fixed in
  # c7a8a70. Does not push.
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build toolkit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/toolkit/Dockerfile
          push: false
          tags: rag-blueprint-ssdb-toolkit:ci
      - name: Build fallback-ui image
        uses: docker/build-push-action@v6
        with:
          context: examples/fallback_ui
          file: examples/fallback_ui/Dockerfile
          push: false
          tags: rag-blueprint-ssdb-fallback-ui:ci
